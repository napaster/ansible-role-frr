---
- name: "frr | Reload frr service"
  ansible.builtin.systemd:
    name: "{{ hostvars[inventory_hostname]['frr_service'] }}"
    state: "reloaded"
  listen: "Restart frr"
  when:
    - "hostvars[inventory_hostname]['frr'] is defined"
    - "hostvars[inventory_hostname]['frr'] not in ['', [], '[]', None]"
    - "hostvars[inventory_hostname]['frr'] |
       community.general.json_query(lookup('ansible.builtin.vars',
      'frr_restart', default='')) == 'true'"
  vars:
    frr_restart: "[] | map(&restart || 'false', @) | [0]"
